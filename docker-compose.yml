services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lifedash
      POSTGRES_USER: lifedash
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lifedash_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifedash"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://lifedash:${POSTGRES_PASSWORD:-lifedash_dev}@db:5432/lifedash
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
